<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 1050" width="750" height="1050">
  <!-- Cavendish Cards front template — interaction. CC0. Font: Atkinson Hyperlegible.
       Special family: these are fixed designs, not art-window frames. The badge IS the art.
       Color + shape are redundant so the cards work for colorblind readers — keep both.
       The five cards:
         come say hi    green    white circle    i want to talk — you can start.
         people i know  yellow   white triangle  only say hi if we've met.
         not right now  red      white square    please don't start talking to me.
         i've got this  white    dark diamond    i can do my own hellos.      (neutral)
         ask first      orange   white star      ask before you touch me.     (consent)
       Lineage: color communication badges, Autism Network International / Autreat, Jim Sinclair, 1996.
       https://stimpunks.org/access/interaction/  This file shows the green card as the worked example. -->
  <rect x="0" y="0" width="750" height="1050" rx="48" fill="#eee8d5"/>
  <rect x="60" y="60" width="34" height="34" rx="9" fill="#1E8E3E"/>
  <text x="108" y="87" font-family="'Atkinson Hyperlegible','Atkinson Hyperlegible Next',sans-serif" font-size="30" font-weight="500" fill="#2C2C2A">interaction</text>
  <rect x="60" y="150" width="630" height="620" rx="24" fill="#1E8E3E"/>
  <circle cx="375" cy="432" r="132" fill="#ffffff" stroke="#00000033" stroke-width="4"/>
  <text x="375" y="655" text-anchor="middle" font-family="'Atkinson Hyperlegible','Atkinson Hyperlegible Next',sans-serif" font-size="34" font-weight="500" fill="#ffffff" letter-spacing="2">green</text>
  <text x="60" y="862" font-family="'Atkinson Hyperlegible','Atkinson Hyperlegible Next',sans-serif" font-size="66" font-weight="700" fill="#002b36">come say hi</text>
  <text x="60" y="922" font-family="'Atkinson Hyperlegible','Atkinson Hyperlegible Next',sans-serif" font-size="30" fill="#586e75">i want to talk — you can start.</text>
</svg>
