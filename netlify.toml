# Netlify build configuration for Cavendish Cards.
#
# On each deploy, Netlify runs the generator (which reads the card files and
# writes web/cards.json and web/faces/), then publishes the web/ folder.
# The generator is pure Python standard library; Netlify's build image
# already includes python3.

[build]
  command = "python3 scripts/build-site.py"
  publish = "web"

# Response headers: security hardening for every response, plus long-lived
# immutable caching for the self-hosted fonts. The CSP can be strict because
# the site loads only same-origin resources (no third-party scripts, styles,
# fonts, or images). frame-ancestors allows embedding from Stimpunks only;
# widen or tighten as needed. The script-src sha256 whitelists the small inline
# no-flash theme script; keep it in sync with _THEME_INLINE in build-site.py and
# the copy in web/index.html (change the script -> recompute the hash).
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), browsing-topics=()"
    Content-Security-Policy = "default-src 'self'; base-uri 'none'; object-src 'none'; frame-ancestors 'self' https://stimpunks.org https://*.stimpunks.org; form-action 'none'; img-src 'self'; style-src 'self'; script-src 'self' 'sha256-7/896sRDDRYbHkuzCgrxnPtpdmQDYaNNIUKwJwO8+Gc='; font-src 'self'; connect-src 'self'; manifest-src 'self'; worker-src 'self'"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
